name: Event Trigger Test

on:
  create:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # 1. Runs on every commit (Configured to FAIL)
  on-commit:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Commit Job
        run: |
          echo "Trigger: This is a standard commit push."
          exit 1

  # 2. Runs only when a new branch is created
  on-branch-create:
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Branch Create Job
        run: echo "Success: A new branch was detected!"

  # 3. Runs when a PR is opened or updated
  on-pr-open:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR Open Job
        run: echo "Success: Pull Request is active."

  # 4. Runs only when code hits the main branch (PR Merge)
  on-pr-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: PR Merge Job
        run: echo "Success: PR was merged into main!"

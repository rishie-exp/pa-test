name: Event Trigger Test

on:
  create:          # Branch creation
  push:            # Commits & PR Merges
  pull_request:    # PR opened/updated
    types: [opened, synchronize]

jobs:
  # 1. Runs on every commit (will FAIL for testing)
  on-commit:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Test: This job triggers on every commit."
          echo "Purposefully failing this job..."
          exit 1

  # 2. Runs only when a new branch is created
  on-branch-create:
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Success: A new branch was created!"

  # 3. Runs when a PR is opened or updated
  on-pr-open:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Success: This PR is now open or has new commits."

  # 4. Runs only when a PR is merged (Push to main)
  on-pr-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Success: Code was merged into the main branch!"
